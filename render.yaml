services:
  - type: web
    name: taskai-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: LLM_PROVIDER
        value: fallback
      - key: AGENT_MAX_ITERATIONS
        value: 8
      - key: AGENT_MEMORY_MESSAGES
        value: 12

  - type: web
    name: taskai-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        value: https://taskai-api.onrender.com/api
